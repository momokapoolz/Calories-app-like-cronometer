        type: number
      fat:
        type: number
      protein:
        type: number
    type: object
  dto.MealLogItemDTO:
    properties:
      food_id:
        type: integer
      quantity:
        type: integer
      quantity_grams:
        type: number
    type: object
  dto.MealLogSummaryDTO:
    properties:
      created_at:
        type: string
