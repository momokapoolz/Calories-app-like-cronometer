        type: array
      id:
        type: integer
      meal_type:
        type: string
      total_calories:
        type: number
    type: object
  dto.RegisterDTO:
    properties:
      activity_level:
        type: string
      age:
        minimum: 1
        type: integer
      email:
        type: string
      gender:
        type: string
      goal:
        type: string
      height:
        type: number
      name:
        type: string
      password:
