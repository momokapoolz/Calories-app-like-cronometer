        type: integer
      total_calories:
        type: number
      total_macronutrients:
        $ref: '#/definitions/dto.MacronutrientsDTO'
    type: object
  dto.FoodItemSummaryDTO:
    properties:
      calories:
        type: number
      food_id:
        type: integer
      food_name:
        type: string
      id:
        type: integer
      quantity:
        type: integer
      quantity_grams:
        type: number
    type: object
  dto.LoginRequestDTO:
    properties:
      email:
        example: momomo@email.com
        type: string
      password:
        example: momomo36
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  dto.LoginResponseDTO:
    properties:
      data: {}
      message:
        type: string
      status:
        type: string
    type: object
  dto.MacronutrientsDTO:
